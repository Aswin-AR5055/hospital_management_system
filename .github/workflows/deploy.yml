name: Deploy Hospital App

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            if ! docker compose version &> /dev/null
            then
              sudo apt install -y docker-compose-plugin
            fi

            if [ ! -d "hospital_management_system" ]; then
              git clone ${{ secrets.REPO_URL }} hospital_management_system
            fi

            cd hospital_management_system
            git fetch --all
            git reset --hard origin/master

            docker compose down
            script: |

            cd hospital-app || git clone ${{ secrets.REPO_URL }} hospital-app
            cd hospital-app
            git pull origin main

            # ===== CREATE ENV FILE =====
            cat > .env <<EOF
            POSTGRES_DB=${{ secrets.DB_NAME }}
            POSTGRES_USER=${{ secrets.DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            EOF

            docker compose down
            docker compose up -d --build
            docker compose up -d --build

            docker compose exec -T backend python manage.py migrate

            docker compose exec -T backend python manage.py collectstatic --noinput

            docker compose exec -T backend python manage.py shell -c "
            from django.contrib.auth import get_user_model;
            User=get_user_model();
            User.objects.filter(username='admin').exists() or
            User.objects.create_superuser('admin','admin@local.com','admin123')