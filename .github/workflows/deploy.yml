name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            sudo apt update
            sudo apt install -y docker.io git curl

            sudo systemctl start docker
            sudo systemctl enable docker

            if [ ! -f /usr/local/bin/docker-compose ]; then
              sudo curl -L https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            if [ ! -d "hospital_management_system" ]; then
              git clone ${{ secrets.REPO_URL }} hospital_management_system
            fi

            cd hospital_management_system
            git pull

            cat > .env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            EOF

            sudo docker-compose down
            sudo docker-compose up -d --build

            echo "Waiting for database to be ready..."
            sleep 10

            sudo docker-compose exec -T backend python manage.py migrate
            sudo docker-compose exec -T backend python manage.py collectstatic --noinput

            sudo docker-compose exec -T backend python manage.py shell <<PYTHON
            from django.contrib.auth import get_user_model
            User = get_user_model()
            if not User.objects.filter(username='admin').exists():
                admin = User.objects.create_superuser('admin', 'admin@hospital.com', 'admin123')
                admin.role = 'reception'
                admin.save()
                print('Superuser created with reception role')
            else:
                admin = User.objects.get(username='admin')
                if not admin.role:
                    admin.role = 'reception'
                    admin.save()
                    print('Updated existing admin with reception role')
                else:
                    print('Superuser already exists with role:', admin.role)
            PYTHON